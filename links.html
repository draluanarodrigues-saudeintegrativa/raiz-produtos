  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --preto: #1A1208; --preto2: #201508; --ouro: #C9A96E;
      --ouro-cl: #DFC28E; --ouro-esc: #8B6E3C; --creme: #F5ECD7;
    }
    html, body { min-height: 100%; background: var(--preto); }
    body {
      font-family: 'DM Sans', sans-serif; font-weight: 300; color: var(--creme);
      display: flex; flex-direction: column; align-items: center;
      padding: 56px 24px 72px; position: relative; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(201,169,110,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(201,169,110,0.04) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    .page { width: 100%; max-width: 480px; position: relative; z-index: 1; }
    .foto-wrap { display: flex; justify-content: center; margin-bottom: 1.6rem; }
    .foto {
      width: 108px; height: 108px; border-radius: 50%;
      object-fit: cover; object-position: center top;
      border: 1.5px solid rgba(201,169,110,0.4); display: block;
    }
    .foto-fallback {

    }
    .titulo {

    .div-linha { width: 36px; height: 1.5px; background: var(--ouro); margin: 0 auto 2.8rem; opacity: 0.6; }
    .links { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .link-card {
      display: flex; align-items: center; gap: 1rem; padding: 18px 22px;
      border: 1px solid rgba(201,169,110,0.2); background: rgba(32,21,8,0.6);
      text-decoration: none; color: var(--creme);
      transition: border-color .2s, background .2s, transform .15s;
      position: relative; overflow: hidden;
    }
    .link-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(201,169,110,0.04) 0%, transparent 100%);
      opacity: 0; transition: opacity .2s;
    }
    .link-card:hover { border-color: rgba(201,169,110,0.5); background: rgba(201,169,110,0.06); transform: translateY(-1px); }
    .link-card:hover::before { opacity: 1; }
    .link-card.destaque { border-color: rgba(201,169,110,0.45); background: rgba(201,169,110,0.07); }
    .link-card.destaque:hover { border-color: var(--ouro); background: rgba(201,169,110,0.12); }
    .link-icon {
      width: 38px; height: 38px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; background: rgba(201,169,110,0.1); border: 1px solid rgba(201,169,110,0.2);
    }
    .link-icon svg { width: 16px; height: 16px; stroke: var(--ouro); fill: none; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
    .link-txt { flex: 1; }
    .link-titulo {
      font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 400;
      color: var(--creme); line-height: 1.2; margin-bottom: 0.2rem;
    }
    .link-card.destaque .link-titulo { color: var(--ouro-cl); }
    .link-desc { font-size: 0.75rem; color: rgba(245,236,215,0.48); line-height: 1.4; letter-spacing: 0.02em; }
    .link-arrow { color: rgba(201,169,110,0.4); font-size: 1rem; flex-shrink: 0; transition: transform .2s, color .2s; }
    .link-card:hover .link-arrow { transform: translateX(3px); color: var(--ouro); }
    .link-card.clube {
      border-color: rgba(201,169,110,0.15); background: rgba(201,169,110,0.03);
      position: relative; overflow: hidden;
    }
    .link-card.clube::after {
      content: ''; position: absolute; top: -40%; right: -20%; width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(201,169,110,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .link-card.clube:hover { border-color: rgba(201,169,110,0.35); background: rgba(201,169,110,0.06); }
    .clube-badge {
      display: inline-block; font-size: 0.58rem; font-weight: 500; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--ouro-esc);
      border: 1px solid rgba(139,110,60,0.35); padding: 2px 8px; margin-bottom: 0.3rem;
    }
    .link-card.clube .link-titulo { color: rgba(245,236,215,0.65); }
    .link-card.clube .link-arrow { color: rgba(201,169,110,0.25); }
    .link-card.clube:hover .link-arrow { color: rgba(201,169,110,0.5); }
    .rodape { margin-top: 3.2rem; text-align: center; }
    .rodape p { font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(139,110,60,0.5); }
    .rodape .raiz-marca {
      font-family: 'Cormorant Garamond', serif; font-size: 0.85rem; font-style: italic;
      color: rgba(201,169,110,0.3); margin-top: 0.4rem; letter-spacing: 0.06em;
    }
  </style>
